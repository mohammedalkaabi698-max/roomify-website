<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROOMIFY</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const firebaseConfig = {
   apiKey: "AIzaSyCWC7R0tI6FIkipOK2UmNC3MgVkzifeLII",
  authDomain: "roomify-cb204.firebaseapp.com",
  projectId: "roomify-cb204",
  storageBucket: "roomify-cb204.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

function App() {
  const [user, setUser] = useState(null);
  const [file, setFile] = useState(null);
  const [projects, setProjects] = useState([]);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [page, setPage] = useState("profile");
  const ADMIN_EMAIL = "mohammedalkaabi698@gmail.com"; 
  useEffect(() => {
    auth.onAuthStateChanged(setUser);
  }, []);

  useEffect(() => {
  if (!user && page === "profile") return;

  let query = db.collection("projects");

  if (page === "profile") {
    query = query.where("userId", "==", user.uid);
  }

  const unsubscribe = query
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {
      setProjects(snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      })));
    });

  return () => unsubscribe();
}, [user, page]);

  // 🔥 Upload باستخدام Storage
 const upload = async () => {
  if (!file || !title.trim()) return;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "upload123");

  try {
    const res = await fetch("https://api.cloudinary.com/v1_1/dpykschcv/image/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
     console.log(data);
    const imageUrl = data.secure_url;

   await db.collection("projects").add({
  image: imageUrl,
  title: title.trim(),
  description: description.trim(),
  likes: 0,
likedBy: [], // 👈 أضف هذا
  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  userId: user?.uid || null
});

    setMessage("تم رفع الصورة ✅");
    setFile(null);
    setTitle("");
    setDescription("");

  } catch (err) {
    setMessage(err.message);
  }
};
const likeProject = async (p) => {
  if (!user) return;

  const ref = db.collection("projects").doc(p.id);

  if (p.likedBy?.includes(user.uid)) {
    alert("انت مسوي لايك قبل 😅");
    return;
  }

  await ref.update({
    likes: (p.likes || 0) + 1,
    likedBy: [...(p.likedBy || []), user.uid]
  });
};
  return (
    <div>

      {/* NAVBAR */}
    <div className="bg-white shadow px-6 py-4 flex justify-between items-center">
      <h1 className="text-2xl font-bold text-gray-800">ROOMIFY</h1>

      <div className="flex items-center gap-4">

        <button
          onClick={() => setPage("profile")}
          className="text-gray-700"
        >
          👤 Profile
        </button>

        <button
          onClick={() => setPage("explore")}
          className="text-gray-700"
        >
          🌍 Explore
        </button>

        <span className="text-gray-600">
          {user ? user.email : "Guest"}
        </span>

        {user && (
          <button
            onClick={() => auth.signOut()}
            className="bg-red-500 text-white px-4 py-1 rounded"
          >
            Logout
          </button>
        )}

      </div>
    </div>
  

      {/* HERO */}
      <div className="text-center py-16 bg-gray-900 text-white">
        <h1 className="text-4xl font-bold">ROOMIFY</h1>
        <p className="text-gray-300">Interior Design Portfolio</p>
      </div>

      {/* AUTH */}
      {!user && (
        <div className="max-w-md mx-auto p-6">
          <input
            className="border p-2 w-full mb-2"
            placeholder="Email"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
          />

          <input
            className="border p-2 w-full mb-2"
            type="password"
            placeholder="Password"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
          />

          <button
            className="bg-black text-white w-full py-2 mb-2"
            onClick={() =>
              auth.createUserWithEmailAndPassword(email, password)
                .then(() => setMessage("Account created"))
                .catch(e => setMessage(e.message))
            }
          >
            Register
          </button>

          <button
            className="bg-gray-700 text-white w-full py-2"
            onClick={() =>
              auth.signInWithEmailAndPassword(email, password)
                .then(() => setMessage("Logged in"))
                .catch(e => setMessage(e.message))
            }
          >
            Login
          </button>

          <button
            className="text-blue-600 mt-2"
            onClick={() => {
              auth.sendPasswordResetEmail(email)
                .then(() => setMessage("تم إرسال رابط تغيير كلمة المرور 📩"))
                .catch(e => setMessage(e.message));
            }}
          >
            Forgot Password?
          </button>

          <p className="text-green-600 mt-2">{message}</p>
        </div>
      )}

      {/* UPLOAD */}
      {user && user.email === ADMIN_EMAIL && (
  <div className="max-w-md mx-auto p-6">
          <input type="file" onChange={(e) => setFile(e.target.files[0])} />

          <input
            className="border p-2 w-full mb-2"
            placeholder="Title"
            value={title}
            onChange={(e) => setTitle(e.target.value)}
          />

          <textarea
            className="border p-2 w-full mb-2"
            placeholder="Description"
            value={description}
            onChange={(e) => setDescription(e.target.value)}
          />
<button
  onClick={() => {
    console.log("BUTTON CLICKED");
    upload();
  }}
  className="bg-black text-white w-full py-2"
>
  Upload
</button>

          <p className="text-green-600 mt-2">{message}</p>
        </div>
      )}

      {/* PROJECTS */}
 <div className="max-w-6xl mx-auto mt-10 px-4">

  <h2 className="text-2xl font-bold mb-6">
    {page === "profile" ? "👤 My Designs" : "🌍 Explore Designs"}
  </h2>

  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    {projects.map((p) => (
      <div
        key={p.id}
        className="bg-white rounded-xl shadow overflow-hidden transform hover:scale-105 hover:shadow-xl transition duration-300"
      >
        <div className="overflow-hidden">
          <img
            src={p.image}
            className="w-full h-52 object-cover hover:scale-110 transition duration-300"
          />
        </div>

        <div className="p-4">
          <h3 className="font-bold text-lg">{p.title}</h3>
      <div className="flex items-center justify-between mt-3">
  <button
    onClick={() => likeProject(p)}
    className="text-pink-500 hover:scale-110 transition"
  >
    ❤️ Like
  </button>

  <span className="text-gray-600 text-sm">
    {p.likes || 0} Likes
  </span>
</div>
         {user?.email === ADMIN_EMAIL && (
  <button
    onClick={() => {
      if (confirm("متأكد تبي تحذف؟")) {
        db.collection("projects").doc(p.id).delete();
      }
    }}
    className="text-red-500 mt-3 text-sm hover:underline"
  >
    Delete
  </button>
)} 
        </div>
      </div>
    ))}
  </div>
</div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
