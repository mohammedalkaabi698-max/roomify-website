<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROOMIFY</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

</head>

<body class="bg-white">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const firebaseConfig = {
   apiKey: "AIzaSyCWC7R0tI6FIkipOK2UmNC3MgVkzifeLII",
  authDomain: "roomify-cb204.firebaseapp.com",
  projectId: "roomify-cb204",
  storageBucket: "roomify-cb204.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

function App() {
  const [user, setUser] = useState(null);
  const [file, setFile] = useState(null);
  const [projects, setProjects] = useState([]);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");

  useEffect(() => {
    auth.onAuthStateChanged(setUser);
  }, []);

  useEffect(() => {
    db.collection("projects")
      .orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {
        setProjects(snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        })));
      });
  }, []);

  // 🔥 Upload باستخدام Storage
 const upload = async () => {
  if (!file || !title.trim()) return;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "ybour76");

  try {
    const res = await fetch("https://api.cloudinary.com/v1_1/dykxschcv/image/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    const imageUrl = data.secure_url;

    await db.collection("projects").add({
      image: imageUrl,
      title: title.trim(),
      description: description.trim(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      userId: user?.uid || null
    });

    setMessage("تم رفع الصورة ✅");
    setFile(null);
    setTitle("");
    setDescription("");

  } catch (err) {
    setMessage(err.message);
  }
};

  return (
    <div>

      {/* NAVBAR */}
      <div className="flex justify-between items-center px-6 py-4 shadow">
        <div className="font-bold">ROOMIFY</div>
        {user ? (
          <button onClick={() => auth.signOut()}>Logout</button>
        ) : (
          <span>Guest</span>
        )}
      </div>

      {/* HERO */}
      <div className="text-center py-16 bg-gray-900 text-white">
        <h1 className="text-4xl font-bold">ROOMIFY</h1>
        <p className="text-gray-300">Interior Design Portfolio</p>
      </div>

      {/* AUTH */}
      {!user && (
        <div className="max-w-md mx-auto p-6">
          <input
            className="border p-2 w-full mb-2"
            placeholder="Email"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
          />

          <input
            className="border p-2 w-full mb-2"
            type="password"
            placeholder="Password"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
          />

          <button
            className="bg-black text-white w-full py-2 mb-2"
            onClick={() =>
              auth.createUserWithEmailAndPassword(email, password)
                .then(() => setMessage("Account created"))
                .catch(e => setMessage(e.message))
            }
          >
            Register
          </button>

          <button
            className="bg-gray-700 text-white w-full py-2"
            onClick={() =>
              auth.signInWithEmailAndPassword(email, password)
                .then(() => setMessage("Logged in"))
                .catch(e => setMessage(e.message))
            }
          >
            Login
          </button>

          <button
            className="text-blue-600 mt-2"
            onClick={() => {
              auth.sendPasswordResetEmail(email)
                .then(() => setMessage("تم إرسال رابط تغيير كلمة المرور 📩"))
                .catch(e => setMessage(e.message));
            }}
          >
            Forgot Password?
          </button>

          <p className="text-green-600 mt-2">{message}</p>
        </div>
      )}

      {/* UPLOAD */}
      {user && (
        <div className="max-w-md mx-auto p-6">
          <input type="file" onChange={(e) => setFile(e.target.files[0])} />

          <input
            className="border p-2 w-full mb-2"
            placeholder="Title"
            value={title}
            onChange={(e) => setTitle(e.target.value)}
          />

          <textarea
            className="border p-2 w-full mb-2"
            placeholder="Description"
            value={description}
            onChange={(e) => setDescription(e.target.value)}
          />

          <button
            onClick={upload}
            className="bg-black text-white w-full py-2"
          >
            Upload
          </button>

          <p className="text-green-600 mt-2">{message}</p>
        </div>
      )}

      {/* PROJECTS */}
      <div className="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-4">
        {projects.map((p) => (
          <div key={p.id} className="border rounded-xl overflow-hidden">

            <img
              src={p.image}
              className="w-full h-48 object-cover"
            />

            <div className="p-4">
              <h3 className="font-bold">{p.title}</h3>
              <p className="text-gray-600">{p.description}</p>

              <button
                onClick={() => {
                  if (confirm("متأكد تبي تحذف؟")) {
                    db.collection("projects").doc(p.id).delete();
                  }
                }}
              >
                Delete
              </button>
            </div>

          </div>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
