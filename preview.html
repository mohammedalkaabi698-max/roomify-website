<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROOMIFY</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-white">

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function BeforeAfterSlider() {
  const [slider, setSlider] = useState(50);

  return (
    <div className="relative w-full h-[420px] rounded-2xl overflow-hidden shadow-lg border">
      
      {/* BEFORE */}
      <div className="absolute inset-0 bg-gray-200 flex items-center justify-center text-gray-500">
        BEFORE IMAGE
      </div>

      {/* AFTER */}
      <div
        className="absolute inset-0 bg-gray-100 flex items-center justify-center text-gray-500"
        style={{ width: slider + "%", overflow: "hidden" }}
      >
        AFTER IMAGE
      </div>

      {/* LINE */}
      <div
        className="absolute top-0 bottom-0 w-1 bg-white shadow"
        style={{ left: slider + "%" }}
      />

      {/* SLIDER */}
      <input
        type="range"
        min="0"
        max="100"
        value={slider}
        onChange={(e) => setSlider(e.target.value)}
        className="absolute bottom-4 left-1/2 -translate-x-1/2 w-2/3"
      />
    </div>
  );
}

function App() {
  return (
    <div>

      {/* NAVBAR */}
      <div className="flex justify-between items-center px-6 py-4 shadow">
        <div className="flex items-center gap-2">
          <div className="w-10 h-10 bg-black text-white flex items-center justify-center rounded-full font-bold">
            R
          </div>
          <div className="font-bold tracking-widest">ROOMIFY</div>
        </div>

        <div className="space-x-4 text-gray-600">
          <a href="#work">Work</a>
          <a href="#gallery">Gallery</a>
          <a href="#contact">Contact</a>
        </div>
      </div>

      {/* HERO */}
      <div className="text-center py-20 bg-gradient-to-br from-gray-900 to-gray-700 text-white">
        <h1 className="text-5xl font-bold tracking-widest">ROOMIFY</h1>
        <p className="mt-3 text-gray-300">Interior Design Transformations</p>
      </div>

      {/* BEFORE/AFTER */}
      <div id="work" className="max-w-5xl mx-auto p-6">
        <h2 className="text-2xl font-bold mb-4">Featured Work</h2>
        <BeforeAfterSlider />
      </div>

      {/* GALLERY */}
      <div id="gallery" className="max-w-5xl mx-auto p-6">
        <h2 className="text-2xl font-bold mb-4">Gallery</h2>
        <div className="grid md:grid-cols-3 gap-4">
          {[1,2,3,4,5,6].map(i => (
            <div key={i} className="h-40 bg-gray-200 rounded-xl flex items-center justify-center text-gray-500">
              Project {i}
            </div>
          ))}
        </div>
      </div>

      {/* CONTACT */}
      <div id="contact" className="text-center py-12 bg-gray-100">
        <h2 className="text-xl font-bold">Contact</h2>
        <p className="text-gray-600">contact@roomify.com</p>
      </div>

      {/* FOOTER */}
      <div className="text-center py-4 text-gray-500 text-sm">
        © ROOMIFY Studio
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
